name: auto rebuild

# Runs daily. Checks if Arch shipped a new version of any tracked package.
# If yes: pulls the new PKGBUILD, applies our patches, builds, signs, and
# publishes to the freeport pacman repo (GitHub Release).
# If patches fail to apply, opens an issue instead of silently breaking.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: freeport-repo-publish
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRACKED_PACKAGES: systemd xdg-desktop-portal accountsservice

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel devtools git jq github-cli curl

      - name: create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: import upstream signing keys
        run: |
          for pkg_dir in distros/arch/*/; do
            if [ -d "${pkg_dir}keys/pgp" ]; then
              for key in ${pkg_dir}keys/pgp/*.asc; do
                su builder -c "gpg --import '$key'" 2>&1 || true
              done
            fi
          done

      - name: import freeport signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import"

      - name: check for upstream version bumps and rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          needs_rebuild=""
          patch_failures=""

          for pkg in $TRACKED_PACKAGES; do
            pkg_dir="distros/arch/${pkg}"

            if [ ! -d "$pkg_dir" ] || [ ! -f "$pkg_dir/PKGBUILD" ]; then
              continue
            fi

            our_ver=$(grep '^pkgver=' "$pkg_dir/PKGBUILD" | cut -d= -f2)

            # get current Arch version from GitLab API
            arch_ver=$(curl -sf "https://gitlab.archlinux.org/api/v4/projects/archlinux%2Fpackaging%2Fpackages%2F${pkg}/repository/files/PKGBUILD/raw?ref=main" 2>/dev/null | grep '^pkgver=' | cut -d= -f2)
            if [ -z "$arch_ver" ]; then
              echo "${pkg}: could not fetch Arch version, skipping"
              continue
            fi

            echo "${pkg}: ours=${our_ver} arch=${arch_ver}"

            if [ "$our_ver" = "$arch_ver" ]; then
              echo "${pkg}: up to date"
              continue
            fi

            echo "${pkg}: new version detected, updating"

            # clone the new PKGBUILD from Arch GitLab, preserve our patches
            cp -r "$pkg_dir/patches" /tmp/patches-${pkg}
            rm -rf "$pkg_dir"
            git clone --depth 1 "https://gitlab.archlinux.org/archlinux/packaging/packages/${pkg}.git" "$pkg_dir"
            cp -r /tmp/patches-${pkg} "$pkg_dir/patches"

            # inject freeport patch loop into prepare() if not present
            if ! grep -q "freeport" "$pkg_dir/PKGBUILD"; then
              python3 -c "
          import re, sys
          with open(sys.argv[1]) as f: t = f.read()
          inject = '''
            # freeport: strip age verification infrastructure
            for p in \"\${startdir}\"/patches/*.patch; do
              [ -f \"\$p\" ] || continue
              if patch -Np1 --dry-run -i \"\$p\" >/dev/null 2>&1; then
                echo \"freeport: applying \$(basename \\\"\$p\\\")\"
                patch -Np1 -i \"\$p\"
              fi
            done
          '''
          t = t.replace('patch -Np1 -i ../0001-Use-Arch-Linux-device-access-groups.patch', 'patch -Np1 -i ../0001-Use-Arch-Linux-device-access-groups.patch\\n' + inject, 1)
          with open(sys.argv[1], 'w') as f: f.write(t)
          " "$pkg_dir/PKGBUILD"
            fi

            chown -R builder:builder "$pkg_dir"
            if su builder -c "cd $pkg_dir && makepkg -so --noconfirm" 2>&1; then
              echo "${pkg}: patches apply clean, building"
              if su builder -c "cd $pkg_dir && makepkg -s --noconfirm --nocheck" 2>&1 || true; then
                # check if packages were actually produced
                if ls ${pkg_dir}/*.pkg.tar.* >/dev/null 2>&1; then
                  needs_rebuild="${needs_rebuild} ${pkg}"
                else
                  patch_failures="${patch_failures}${pkg}: build produced no packages\n"
                fi
              fi
            else
              patch_failures="${patch_failures}${pkg}: patches do not apply to ${arch_ver}\n"
            fi
          done

          if [ -n "$needs_rebuild" ]; then
            git config user.name "freeport-bot"
            git config user.email "freeport-bot@users.noreply.github.com"
            git add distros/
            git commit -m "auto-update:${needs_rebuild}" || true
            git push || true
          fi

          if [ -n "$patch_failures" ]; then
            echo "patch failures detected:"
            echo -e "$patch_failures"
            {
              echo "patch_failures<<EOF"
              echo -e "$patch_failures"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "has_failures=1" >> "$GITHUB_ENV"
          fi

          if [ -n "$needs_rebuild" ]; then
            echo "has_packages=1" >> "$GITHUB_ENV"
          fi

      - name: sign packages and publish repo
        if: env.has_packages == '1'
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/repo

          # collect packages from all tracked dirs
          for pkg in $TRACKED_PACKAGES; do
            for f in distros/arch/${pkg}/*.pkg.tar.*; do
              case "$f" in *.sig) continue ;; esac
              [ -f "$f" ] && cp "$f" /tmp/repo/
            done
          done

          chown -R builder:builder /tmp/repo
          cd /tmp/repo

          # sign each package
          for f in *.pkg.tar.*; do
            [ -f "$f" ] || continue
            echo "$GPG_PASSPHRASE" | su builder -c \
              "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign '$f'"
          done

          # fetch existing database so repo-add appends
          gh release download repo -p "freeport.db.tar.gz" -p "freeport.files.tar.gz" \
            --repo ryandward/freeport --dir . 2>/dev/null || true

          # move .sig files aside so repo-add doesn't choke
          mkdir -p /tmp/sigs
          mv *.sig /tmp/sigs/ 2>/dev/null || true

          # build repo database
          su builder -c "repo-add freeport.db.tar.gz *.pkg.tar.*"

          # restore .sig files
          mv /tmp/sigs/*.sig . 2>/dev/null || true

          # sign the database files
          for db in freeport.db.tar.gz freeport.files.tar.gz; do
            [ -f "$db" ] || continue
            echo "$GPG_PASSPHRASE" | su builder -c \
              "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign '$db'"
          done

          # dereference symlinks (GitHub Releases can't host them)
          for link in freeport.db freeport.files; do
            if [ -L "$link" ]; then
              target=$(readlink "$link")
              rm "$link"
              cp "$target" "$link"
            fi
            if [ -f "${link}.tar.gz.sig" ] && [ ! -f "${link}.sig" ]; then
              cp "${link}.tar.gz.sig" "${link}.sig"
            fi
          done

          # upload everything to the release
          for f in *; do
            [ -f "$f" ] || continue
            gh release upload repo "$f" --repo ryandward/freeport --clobber
          done

      - name: open issue on patch failure
        if: env.has_failures == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create patch-failure --color d73a4a --description "patches need manual rebasing" 2>&1 || true
          gh issue create \
            --title "patches need rebasing" \
            --body "${{ env.patch_failures }}" \
            --label patch-failure 2>/dev/null || \
          gh issue create \
            --title "patches need rebasing" \
            --body "${{ env.patch_failures }}"
