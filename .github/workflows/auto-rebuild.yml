name: auto rebuild

# Runs daily. Checks if Arch shipped a new version of any tracked package.
# If yes: pulls the new PKGBUILD, applies our patches, builds, signs, and
# publishes to the freeport pacman repo (GitHub Release).
# If patches fail to apply, opens an issue instead of silently breaking.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TRACKED_PACKAGES: systemd xdg-desktop-portal accountsservice

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel devtools git jq
          pacman -S --noconfirm --needed asp || pip install asp-archlinux || echo "asp not available, using git clone fallback"

      - name: create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: import upstream signing keys
        run: |
          for pkg_dir in distros/arch/*/; do
            if [ -d "${pkg_dir}keys/pgp" ]; then
              for key in ${pkg_dir}keys/pgp/*.asc; do
                su builder -c "gpg --import '$key'" 2>&1 || true
              done
            fi
          done

      - name: import freeport signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import"
          KEY_ID=$(echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import --import-options show-only" 2>&1 | grep -oP '[A-F0-9]{40}' | head -1)
          echo "FREEPORT_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: check for upstream version bumps and rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          needs_rebuild=""
          patch_failures=""

          for pkg in $TRACKED_PACKAGES; do
            pkg_dir="distros/arch/${pkg}"

            if [ ! -d "$pkg_dir" ] || [ ! -f "$pkg_dir/PKGBUILD" ]; then
              continue
            fi

            our_ver=$(grep '^pkgver=' "$pkg_dir/PKGBUILD" | cut -d= -f2)
            asp export "$pkg" /tmp/asp-${pkg} 2>/dev/null || continue
            arch_ver=$(grep '^pkgver=' "/tmp/asp-${pkg}/PKGBUILD" | cut -d= -f2)

            echo "${pkg}: ours=${our_ver} arch=${arch_ver}"

            if [ "$our_ver" = "$arch_ver" ]; then
              echo "${pkg}: up to date"
              continue
            fi

            echo "${pkg}: new version detected, updating"

            cp -r "$pkg_dir/patches" /tmp/patches-${pkg}
            rm -rf "$pkg_dir"
            cp -r "/tmp/asp-${pkg}" "$pkg_dir"
            cp -r /tmp/patches-${pkg} "$pkg_dir/patches"

            # inject freeport patch loop into prepare() if not present
            if ! grep -q "freeport" "$pkg_dir/PKGBUILD"; then
              python3 -c "
          import re, sys
          with open(sys.argv[1]) as f: t = f.read()
          inject = '''
            # freeport: strip age verification infrastructure
            for p in \"\${startdir}\"/patches/*.patch; do
              [ -f \"\$p\" ] || continue
              if patch -Np1 --dry-run -i \"\$p\" >/dev/null 2>&1; then
                echo \"freeport: applying \$(basename \\\"\$p\\\")\"
                patch -Np1 -i \"\$p\"
              fi
            done
          '''
          t = t.replace('patch -Np1 -i ../0001-Use-Arch-Linux-device-access-groups.patch', 'patch -Np1 -i ../0001-Use-Arch-Linux-device-access-groups.patch\\n' + inject, 1)
          with open(sys.argv[1], 'w') as f: f.write(t)
          " "$pkg_dir/PKGBUILD"
            fi

            chown -R builder:builder "$pkg_dir"
            if su builder -c "cd $pkg_dir && makepkg -so --noconfirm" 2>&1; then
              echo "${pkg}: patches apply clean, building"
              if su builder -c "cd $pkg_dir && makepkg -s --noconfirm --nocheck" 2>&1; then
                needs_rebuild="${needs_rebuild} ${pkg}"
              else
                patch_failures="${patch_failures}${pkg}: build failed after patching\n"
              fi
            else
              patch_failures="${patch_failures}${pkg}: patches do not apply to ${arch_ver}\n"
            fi
          done

          if [ -n "$needs_rebuild" ]; then
            git config user.name "freeport-bot"
            git config user.email "freeport-bot@users.noreply.github.com"
            git add distros/
            git commit -m "auto-update:${needs_rebuild}" || true
            git push || true
          fi

          if [ -n "$patch_failures" ]; then
            echo "patch failures detected:"
            echo -e "$patch_failures"
            {
              echo "patch_failures<<EOF"
              echo -e "$patch_failures"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "has_failures=1" >> "$GITHUB_ENV"
          fi

          # flag that we have packages to publish
          if [ -n "$needs_rebuild" ]; then
            echo "has_packages=1" >> "$GITHUB_ENV"
          fi

      - name: sign packages and publish repo
        if: env.has_packages == '1'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/repo

          # collect all built packages
          for pkg in $TRACKED_PACKAGES; do
            cp distros/arch/${pkg}/*.pkg.tar.* /tmp/repo/ 2>/dev/null || true
          done

          # remove any .sig files from the build, we sign fresh
          rm -f /tmp/repo/*.sig

          # sign each package
          for f in /tmp/repo/*.pkg.tar.*; do
            [ -f "$f" ] || continue
            su builder -c "gpg --batch --yes --passphrase '$GPG_PASSPHRASE' --pinentry-mode loopback --detach-sign '$f'"
          done

          # download existing repo packages so we don't lose them
          gh release download repo --dir /tmp/existing --pattern '*.pkg.tar.*' 2>/dev/null || true
          if [ -d /tmp/existing ]; then
            for f in /tmp/existing/*; do
              base=$(basename "$f")
              if [ ! -f "/tmp/repo/$base" ]; then
                cp "$f" /tmp/repo/
              fi
            done
          fi

          # create repo database
          cd /tmp/repo
          su builder -c "repo-add --sign --key '$FREEPORT_KEY_ID' freeport.db.tar.gz *.pkg.tar.!(sig)"

          # create or update the release
          if gh release view repo --repo ryandward/freeport >/dev/null 2>&1; then
            gh release delete-asset repo --yes --pattern '*' --repo ryandward/freeport 2>/dev/null || true
            gh release upload repo /tmp/repo/* --repo ryandward/freeport --clobber
          else
            gh release create repo /tmp/repo/* \
              --repo ryandward/freeport \
              --title "freeport pacman repository" \
              --notes "Add to pacman.conf to receive patched packages. See README for setup instructions." \
              --latest=false
          fi

          echo "published to freeport repo release"

      - name: upload built packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: freeport-packages
          path: distros/arch/*/*.pkg.tar.*
          if-no-files-found: ignore

      - name: open issue on patch failure
        if: env.has_failures == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create patch-failure --color d73a4a --description "patches need manual rebasing" 2>&1 || true
          gh issue create \
            --title "patches need rebasing" \
            --body "${{ env.patch_failures }}" \
            --label patch-failure 2>/dev/null || \
          gh issue create \
            --title "patches need rebasing" \
            --body "${{ env.patch_failures }}"
