name: build arch packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (e.g. systemd)'
        required: true

permissions:
  contents: write

concurrency:
  group: freeport-repo-publish
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: validate package exists
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          if [ ! -f "${pkg}/PKGBUILD" ]; then
            echo "ERROR: no PKGBUILD at ${pkg}"
            exit 1
          fi

      - name: install build dependencies
        run: |
          pacman -Syu --noconfirm base-devel devtools git github-cli

      - name: create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: import upstream signing keys
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          if [ -d "${pkg}/keys/pgp" ]; then
            for key in ${pkg}/keys/pgp/*.asc; do
              su builder -c "gpg --import '$key'" 2>&1 || true
            done
          fi

      - name: import freeport signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import"

      - name: install package specific build deps
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          cd "$pkg"
          chown -R builder:builder .
          su builder -c "makepkg --syncdeps --noconfirm --nobuild --noprepare" || true

      - name: build
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          cd "$pkg"
          chown -R builder:builder .
          su builder -c "makepkg -s --noconfirm --nocheck"

      - name: verify no age verification in output
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          found=0
          for f in ${pkg}/*.pkg.tar.*; do
            [ -f "$f" ] || continue
            if strings "$f" 2>/dev/null | grep -qiE "birthDate|birth_date|BIRTH_DATE|parse_birth_date|ageGroup|age_group|ParentalControls"; then
              echo "FAIL: age verification strings found in $(basename $f)"
              strings "$f" | grep -iE "birthDate|birth_date|BIRTH_DATE|parse_birth_date|ageGroup|age_group|ParentalControls"
              found=1
            fi
          done
          if [ "$found" = "1" ]; then
            exit 1
          fi
          echo "PASS: no age verification strings in built packages"

      - name: sign packages and publish repo
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          mkdir -p /tmp/repo

          # collect built packages, skip .sig files
          for f in ${pkg}/*.pkg.tar.*; do
            case "$f" in *.sig) continue ;; esac
            [ -f "$f" ] && cp "$f" /tmp/repo/
          done

          chown -R builder:builder /tmp/repo
          cd /tmp/repo

          # sign each package
          for f in *.pkg.tar.*; do
            [ -f "$f" ] || continue
            echo "$GPG_PASSPHRASE" | su builder -c \
              "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign '$f'"
          done

          # fetch existing database so repo-add appends
          gh release download repo -p "freeport.db.tar.gz" -p "freeport.files.tar.gz" \
            --repo ryandward/freeport --dir . 2>/dev/null || true

          # move .sig files aside so repo-add doesn't choke on them
          mkdir -p /tmp/sigs
          mv *.sig /tmp/sigs/ 2>/dev/null || true

          # build repo database
          su builder -c "repo-add freeport.db.tar.gz *.pkg.tar.*"

          # restore .sig files
          mv /tmp/sigs/*.sig . 2>/dev/null || true

          # sign the database files
          for db in freeport.db.tar.gz freeport.files.tar.gz; do
            [ -f "$db" ] || continue
            echo "$GPG_PASSPHRASE" | su builder -c \
              "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign '$db'"
          done

          # dereference symlinks (GitHub Releases can't host them)
          for link in freeport.db freeport.files; do
            if [ -L "$link" ]; then
              target=$(readlink "$link")
              rm "$link"
              cp "$target" "$link"
            fi
            if [ -f "${link}.tar.gz.sig" ] && [ ! -f "${link}.sig" ]; then
              cp "${link}.tar.gz.sig" "${link}.sig"
            fi
          done

          # upload everything to the release
          for f in *; do
            [ -f "$f" ] || continue
            gh release upload repo "$f" --repo ryandward/freeport --clobber
          done
