name: build arch packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (e.g. systemd)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: validate package exists
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          if [ ! -f "${pkg}/PKGBUILD" ]; then
            echo "ERROR: no PKGBUILD at ${pkg}"
            exit 1
          fi

      - name: install build dependencies
        run: |
          pacman -Syu --noconfirm base-devel devtools git

      - name: create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: import upstream signing keys
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          if [ -d "${pkg}/keys/pgp" ]; then
            for key in ${pkg}/keys/pgp/*.asc; do
              su builder -c "gpg --import '$key'" 2>&1 || true
            done
          fi

      - name: import freeport signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import"
          # extract key ID
          KEY_ID=$(echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import --import-options show-only" 2>&1 | grep -oP '[A-F0-9]{40}' | head -1)
          echo "FREEPORT_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: install package specific build deps
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          cd "$pkg"
          chown -R builder:builder .
          su builder -c "makepkg --syncdeps --noconfirm --nobuild --noprepare" || true

      - name: build
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          cd "$pkg"
          chown -R builder:builder .
          su builder -c "makepkg -s --noconfirm --nocheck"

      - name: verify no age verification in output
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          found=0
          for f in ${pkg}/*.pkg.tar.*; do
            [ -f "$f" ] || continue
            if strings "$f" 2>/dev/null | grep -qiE "birthDate|birth_date|BIRTH_DATE|parse_birth_date|ageGroup|age_group|ParentalControls"; then
              echo "FAIL: age verification strings found in $(basename $f)"
              strings "$f" | grep -iE "birthDate|birth_date|BIRTH_DATE|parse_birth_date|ageGroup|age_group|ParentalControls"
              found=1
            fi
          done
          if [ "$found" = "1" ]; then
            exit 1
          fi
          echo "PASS: no age verification strings in built packages"

      - name: sign packages and publish repo
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pkg="distros/arch/${{ inputs.package }}"
          mkdir -p /tmp/repo

          # collect built packages
          cp ${pkg}/*.pkg.tar.* /tmp/repo/ 2>/dev/null || true

          # remove any .sig files from the build, we sign fresh
          rm -f /tmp/repo/*.sig

          # builder needs to own the directory to write signatures
          chown -R builder:builder /tmp/repo

          # sign each package
          for f in /tmp/repo/*.pkg.tar.*; do
            [ -f "$f" ] || continue
            su builder -c "gpg --batch --yes --passphrase '$GPG_PASSPHRASE' --pinentry-mode loopback --detach-sign '$f'"
          done

          # download existing repo packages so we don't lose them
          gh release download repo --dir /tmp/existing --pattern '*.pkg.tar.*' 2>/dev/null || true
          if [ -d /tmp/existing ]; then
            for f in /tmp/existing/*; do
              base=$(basename "$f")
              # don't overwrite packages we just built
              if [ ! -f "/tmp/repo/$base" ]; then
                cp "$f" /tmp/repo/
              fi
            done
          fi

          # create repo database
          cd /tmp/repo
          su builder -c "repo-add --sign --key '$FREEPORT_KEY_ID' freeport.db.tar.gz *.pkg.tar.!(sig)"

          # create or update the release
          if gh release view repo --repo ryandward/freeport >/dev/null 2>&1; then
            # delete old assets and re-upload everything
            gh release delete-asset repo --yes --pattern '*' --repo ryandward/freeport 2>/dev/null || true
            gh release upload repo /tmp/repo/* --repo ryandward/freeport --clobber
          else
            gh release create repo /tmp/repo/* \
              --repo ryandward/freeport \
              --title "freeport pacman repository" \
              --notes "Add to pacman.conf to receive patched packages. See README for setup instructions." \
              --latest=false
          fi

          echo "published $(ls /tmp/repo/*.pkg.tar.* | wc -l) files to release"

      - name: upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package }}-packages
          path: distros/arch/${{ inputs.package }}/*.pkg.tar.*
          if-no-files-found: error
