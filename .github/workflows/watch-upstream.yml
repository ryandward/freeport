name: watch upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: scan upstream for age verification activity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .tracking
          touch .tracking/seen.txt
          touch /tmp/findings.txt

          repos=(
            "systemd/systemd"
            "flatpak/xdg-desktop-portal"
            "freedesktop/accountsservice"
            "archlinux/archinstall"
            "canonical/ubuntu-desktop-provision"
            "GNOME/gnome-control-center"
            "GNOME/gnome-initial-setup"
            "GNOME/xdg-desktop-portal-gnome"
            "elementary/settings-useraccounts"
            "elementary/portals"
            "outerheaven199X/ageverifyd"
            "AntiSurv/oss-anti-surveillance"
            "BryanLunduke/DoesItAgeVerify"
          )

          terms=(
            "birthDate"
            "birth date"
            "birth_date"
            "age verification"
            "age assurance"
            "ageGroup"
            "age bracket"
            "parental control age"
            "AB-1043"
          )

          for repo in "${repos[@]}"; do
            for term in "${terms[@]}"; do
              echo "searching ${repo} for '${term}'..."
              curl -s "https://api.github.com/search/issues?q=repo:${repo}+is:pr+${term// /+}&sort=updated&per_page=20" \
                -H "Accept: application/vnd.github.v3+json" | \
                jq -r '.items[]? | "\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/repo_results.txt || true

              while IFS='|' read -r num title state url; do
                [ -z "$num" ] && continue
                key="${repo}#${num}"
                if ! grep -qF "$key" .tracking/seen.txt; then
                  echo "FOUND: ${key} [${state}] ${title}"
                  printf "PR %s [%s] %s\n  %s\n\n" "${key}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                  echo "$key" >> .tracking/seen.txt
                fi
              done < /tmp/repo_results.txt
            done
            sleep 1
          done

          # watch dylanmtaylor directly
          echo "watching dylanmtaylor..."
          curl -s "https://api.github.com/search/issues?q=author:dylanmtaylor+is:pr&sort=updated&per_page=30" \
            -H "Accept: application/vnd.github.v3+json" | \
            jq -r '.items[]? | "\(.repository_url | split("/") | .[-2:] | join("/"))#\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/dt_results.txt || true

          while IFS='|' read -r id title state url; do
            [ -z "$id" ] && continue
            lower_title=$(echo "$title" | tr '[:upper:]' '[:lower:]')
            if echo "$lower_title" | grep -qE "birth|age.verif|age.assur|age.gate|age.bracket|ab-1043|parental|compliance.age"; then
              if ! grep -qF "$id" .tracking/seen.txt; then
                echo "FOUND: dylanmtaylor ${id} [${state}] ${title}"
                printf "WATCH:dylanmtaylor %s [%s] %s\n  %s\n\n" "${id}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                echo "$id" >> .tracking/seen.txt
              fi
            fi
          done < /tmp/dt_results.txt

          # broad search: discover NEW repos we should be watching
          # filter out noise by requiring the PR title itself to mention age/birth/verification
          echo "running broad search..."
          broad_terms=(
            '"age verification" operating system'
            '"age verification" linux desktop'
            '"birth date" user record'
            '"birthDate" userdb OR accountsservice OR portal'
            'AB-1043 compliance'
            '"age assurance" freedesktop OR systemd OR gnome OR kde'
            '"age bracket" dbus OR portal'
            '"parental controls" portal age'
          )

          for q in "${broad_terms[@]}"; do
            curl -s "https://api.github.com/search/issues?q=${q// /+}+is:pr&sort=updated&per_page=10" \
              -H "Accept: application/vnd.github.v3+json" | \
              jq -r '.items[]? | "\(.repository_url | split("/") | .[-2:] | join("/"))#\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/broad_results.txt || true

            while IFS='|' read -r id title state url; do
              [ -z "$id" ] && continue
              # title must actually be about age verification, not random matches
              lower_title=$(echo "$title" | tr '[:upper:]' '[:lower:]')
              if ! echo "$lower_title" | grep -qE "birth|age.verif|age.assur|age.bracket|age.gate|ab-1043|parental.control|age.require"; then
                continue
              fi
              if ! grep -qF "$id" .tracking/seen.txt; then
                echo "FOUND: broad ${id} [${state}] ${title}"
                printf "BROAD %s [%s] %s\n  %s\n\n" "${id}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                echo "$id" >> .tracking/seen.txt
              fi
            done < /tmp/broad_results.txt
            sleep 1
          done

          # scan Arch GitLab (pacman, archinstall, etc)
          echo "scanning Arch GitLab..."
          gitlab_projects=(
            "19637"   # pacman/pacman
            "19612"   # pacman/alpm.rs
            "85320"   # pacman/libmakepkg-dropins
          )
          gitlab_terms=("age" "birth" "verification" "parental")

          for pid in "${gitlab_projects[@]}"; do
            for term in "${gitlab_terms[@]}"; do
              curl -s "https://gitlab.archlinux.org/api/v4/projects/${pid}/merge_requests?search=${term}&state=all&per_page=10" | \
                jq -r '.[]? | "\(.iid)|\(.title)|\(.state)|\(.web_url)"' 2>/dev/null > /tmp/gitlab_results.txt || true

              while IFS='|' read -r iid title state url; do
                [ -z "$iid" ] && continue
                key="gitlab:${pid}!${iid}"
                if ! grep -qF "$key" .tracking/seen.txt; then
                  echo "FOUND: gitlab ${key} [${state}] ${title}"
                  printf "GITLAB %s [%s] %s\n  %s\n\n" "${key}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                  echo "$key" >> .tracking/seen.txt
                fi
              done < /tmp/gitlab_results.txt
            done
          done

          # report
          if [ -s /tmp/findings.txt ]; then
            echo "=== FINDINGS ==="
            cat /tmp/findings.txt
            echo "has_findings=1" >> "$GITHUB_ENV"
            {
              echo "NEW_FINDINGS<<FINDINGS_EOF"
              cat /tmp/findings.txt
              echo "FINDINGS_EOF"
            } >> "$GITHUB_ENV"

            git config user.name "freeport-bot"
            git config user.email "freeport-bot@users.noreply.github.com"
            git add .tracking/seen.txt
            git commit -m "tracking: update seen list" || true
            git push || true
          else
            echo "no new findings"
          fi

      - name: create or update tracking issue
        if: env.has_findings == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create upstream-watch --color 0e8a16 --description "automated upstream age verification tracking" 2>&1 || true

          existing=$(gh issue list --label upstream-watch --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body "$NEW_FINDINGS"
          else
            gh issue create \
              --title "upstream age verification activity detected" \
              --body "$NEW_FINDINGS" \
              --label upstream-watch 2>/dev/null || \
            gh issue create \
              --title "upstream age verification activity detected" \
              --body "$NEW_FINDINGS"
          fi

      - name: generate site data
        shell: bash
        run: |
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # fetch live status for each tracked target
          python3 -c "
          import json, subprocess, sys

          def gh_pr(repo, num):
              try:
                  r = subprocess.run(
                      ['gh', 'pr', 'view', str(num), '--repo', repo, '--json', 'state,author,title'],
                      capture_output=True, text=True, timeout=10)
                  if r.returncode == 0:
                      return json.loads(r.stdout)
              except: pass
              return None

          targets = [
              {'project':'systemd','repo':'systemd/systemd','component':'userdb','threat':'birthDate field in user records, --birth-date flag in homectl','pr_num':'#40954','pr':'https://github.com/systemd/systemd/pull/40954','author':'dylanmtaylor','patch':'available','notes':'Revert PR #41179 was closed, not merged. Code remains in main.'},
              {'project':'xdg-desktop-portal','repo':'flatpak/xdg-desktop-portal','component':'ParentalControls portal','threat':'QueryAgeBracket D-Bus method exposing user age ranges to apps','pr_num':'#1922','pr':'https://github.com/flatpak/xdg-desktop-portal/pull/1922','author':'davidedmundson','patch':'draft','notes':'KDE core developer. PR locked after heated debate.'},
              {'project':'accountsservice','repo':'accountsservice/accountsservice','component':'user accounts','threat':'BirthDate property with polkit-gated Get/Set methods','pr_num':'MR !176','pr':'https://gitlab.freedesktop.org/accountsservice/accountsservice/-/merge_requests/176','author':'unknown','patch':'none','notes':'D-Bus layer for desktop birth date storage.'},
              {'project':'archinstall','repo':'archlinux/archinstall','component':'installer','threat':'Required birth date field during user creation','pr_num':'#4290','pr':'https://github.com/archlinux/archinstall/pull/4290','author':'dylanmtaylor','patch':'none','notes':'Same author as systemd PR. Writes to userdb.'},
              {'project':'elementary OS','repo':'elementary/settings-useraccounts','component':'user settings','threat':'Age declaration UI in account creation','pr_num':'#270','pr':'https://github.com/elementary/settings-useraccounts/pull/270','author':'danirabbit','patch':'none','notes':'Author is the elementary OS founder.'},
              {'project':'elementary OS','repo':'elementary/portals','component':'desktop portals','threat':'Account portal exposing user info to applications','pr_num':'#180','pr':'https://github.com/elementary/portals/pull/180','author':'danirabbit','patch':'none','notes':'Portal-layer integration for age data.'},
              {'project':'pacman','repo':'pacman/pacman','component':'package manager','threat':'agerequirement field in PKGBUILDs','pr_num':'MR !353','pr':'https://gitlab.archlinux.org/pacman/pacman/-/merge_requests/353','author':'allan','patch':'watching','notes':'Satirical MR from the pacman maintainer. Watching for real attempts.'},
              {'project':'ageverifyd','repo':'outerheaven199X/ageverifyd','component':'D-Bus daemon','threat':'Reference implementation of org.freedesktop.AgeVerification1','pr_num':'repo','pr':'https://github.com/outerheaven199X/ageverifyd','author':'outerheaven199X','patch':'n/a','notes':'Standalone daemon. SetAge, SetDateOfBirth, GetAgeBracket methods.'},
          ]

          # try to get live status from github
          for t in targets:
              repo = t['repo']
              num = t['pr_num'].lstrip('#')
              if num.isdigit():
                  info = gh_pr(repo, num)
                  if info:
                      t['status'] = info['state'].lower()
                      if t['status'] == 'closed': t['status'] = 'merged' if 'merge' in str(info).lower() else 'closed'
                  else:
                      t['status'] = 'unknown'
              elif 'MR' in t['pr_num']:
                  t['status'] = 'open'
              else:
                  t['status'] = 'active'

          # hardcode known statuses where API is wrong
          # PR 40954 is merged (gh returns MERGED as state)
          for t in targets:
              if t['pr_num'] == '#40954': t['status'] = 'merged'
              if t['pr_num'] == 'MR !353': t['status'] = 'satirical'

          # scan distros/ for real patch files
          import os, glob
          patches = []
          for pf in sorted(glob.glob('distros/*/*/patches/*.patch')):
              parts = pf.split('/')
              distro = parts[1]
              package = parts[2]
              # draft if filename contains 'draft' or 'remove', verified otherwise
              status = 'draft' if 'draft' in pf or 'remove' in pf else 'verified'
              patches.append({'package': package, 'distro': distro, 'status': status, 'file': pf})

          data = {'updated': '$now', 'targets': targets, 'patches': patches}
          with open('site/data.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('site/data.json generated')
          " || echo "data generation failed, keeping existing"

      - name: push site data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet site/data.json 2>/dev/null; then
            echo "no site data changes"
          else
            git config user.name "freeport-bot"
            git config user.email "freeport-bot@users.noreply.github.com"
            git add site/data.json
            git commit -m "site: update tracking data" || true
            git push || true
          fi
