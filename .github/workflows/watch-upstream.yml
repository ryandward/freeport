name: watch upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: scan upstream for age verification activity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .tracking
          touch .tracking/seen.txt
          touch /tmp/findings.txt

          repos=(
            "systemd/systemd"
            "flatpak/xdg-desktop-portal"
            "freedesktop/accountsservice"
            "archlinux/archinstall"
            "canonical/ubuntu-desktop-provision"
            "GNOME/gnome-control-center"
            "GNOME/gnome-initial-setup"
            "GNOME/xdg-desktop-portal-gnome"
          )

          terms=(
            "birthDate"
            "birth date"
            "birth_date"
            "age verification"
            "age assurance"
            "ageGroup"
            "age bracket"
            "parental control age"
            "AB-1043"
          )

          for repo in "${repos[@]}"; do
            for term in "${terms[@]}"; do
              echo "searching ${repo} for '${term}'..."
              curl -s "https://api.github.com/search/issues?q=repo:${repo}+is:pr+${term// /+}&sort=updated&per_page=20" \
                -H "Accept: application/vnd.github.v3+json" | \
                jq -r '.items[]? | "\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/repo_results.txt || true

              while IFS='|' read -r num title state url; do
                [ -z "$num" ] && continue
                key="${repo}#${num}"
                if ! grep -qF "$key" .tracking/seen.txt; then
                  echo "FOUND: ${key} [${state}] ${title}"
                  printf "PR %s [%s] %s\n  %s\n\n" "${key}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                  echo "$key" >> .tracking/seen.txt
                fi
              done < /tmp/repo_results.txt
            done
            sleep 1
          done

          # watch dylanmtaylor directly
          echo "watching dylanmtaylor..."
          curl -s "https://api.github.com/search/issues?q=author:dylanmtaylor+is:pr&sort=updated&per_page=30" \
            -H "Accept: application/vnd.github.v3+json" | \
            jq -r '.items[]? | "\(.repository_url | split("/") | .[-2:] | join("/"))#\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/dt_results.txt || true

          while IFS='|' read -r id title state url; do
            [ -z "$id" ] && continue
            lower_title=$(echo "$title" | tr '[:upper:]' '[:lower:]')
            if echo "$lower_title" | grep -qE "birth|age.verif|age.assur|age.gate|age.bracket|ab-1043|parental|compliance.age"; then
              if ! grep -qF "$id" .tracking/seen.txt; then
                echo "FOUND: dylanmtaylor ${id} [${state}] ${title}"
                printf "WATCH:dylanmtaylor %s [%s] %s\n  %s\n\n" "${id}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                echo "$id" >> .tracking/seen.txt
              fi
            fi
          done < /tmp/dt_results.txt

          # broad search
          echo "running broad search..."
          broad_terms=(
            '"age verification" linux'
            '"age verification" freedesktop'
            '"birth date" systemd'
            'AB-1043 operating system'
            '"age assurance" desktop linux'
          )

          for q in "${broad_terms[@]}"; do
            curl -s "https://api.github.com/search/issues?q=${q// /+}+is:pr&sort=updated&per_page=5" \
              -H "Accept: application/vnd.github.v3+json" | \
              jq -r '.items[]? | "\(.repository_url | split("/") | .[-2:] | join("/"))#\(.number)|\(.title)|\(.state)|\(.html_url)"' 2>/dev/null > /tmp/broad_results.txt || true

            while IFS='|' read -r id title state url; do
              [ -z "$id" ] && continue
              if ! grep -qF "$id" .tracking/seen.txt; then
                echo "FOUND: broad ${id} [${state}] ${title}"
                printf "BROAD %s [%s] %s\n  %s\n\n" "${id}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                echo "$id" >> .tracking/seen.txt
              fi
            done < /tmp/broad_results.txt
            sleep 1
          done

          # scan Arch GitLab (pacman, archinstall, etc)
          echo "scanning Arch GitLab..."
          gitlab_projects=(
            "19637"   # pacman/pacman
            "19612"   # pacman/alpm.rs
            "85320"   # pacman/libmakepkg-dropins
          )
          gitlab_terms=("age" "birth" "verification" "parental")

          for pid in "${gitlab_projects[@]}"; do
            for term in "${gitlab_terms[@]}"; do
              curl -s "https://gitlab.archlinux.org/api/v4/projects/${pid}/merge_requests?search=${term}&state=all&per_page=10" | \
                jq -r '.[]? | "\(.iid)|\(.title)|\(.state)|\(.web_url)"' 2>/dev/null > /tmp/gitlab_results.txt || true

              while IFS='|' read -r iid title state url; do
                [ -z "$iid" ] && continue
                key="gitlab:${pid}!${iid}"
                if ! grep -qF "$key" .tracking/seen.txt; then
                  echo "FOUND: gitlab ${key} [${state}] ${title}"
                  printf "GITLAB %s [%s] %s\n  %s\n\n" "${key}" "${state}" "${title}" "${url}" >> /tmp/findings.txt
                  echo "$key" >> .tracking/seen.txt
                fi
              done < /tmp/gitlab_results.txt
            done
          done

          # report
          if [ -s /tmp/findings.txt ]; then
            echo "=== FINDINGS ==="
            cat /tmp/findings.txt
            echo "has_findings=1" >> "$GITHUB_ENV"
            {
              echo "NEW_FINDINGS<<FINDINGS_EOF"
              cat /tmp/findings.txt
              echo "FINDINGS_EOF"
            } >> "$GITHUB_ENV"

            git config user.name "freeport-bot"
            git config user.email "freeport-bot@users.noreply.github.com"
            git add .tracking/seen.txt
            git commit -m "tracking: update seen list" || true
            git push || true
          else
            echo "no new findings"
          fi

      - name: create or update tracking issue
        if: env.has_findings == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create upstream-watch --color 0e8a16 --description "automated upstream age verification tracking" 2>&1 || true

          existing=$(gh issue list --label upstream-watch --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body "$NEW_FINDINGS"
          else
            gh issue create \
              --title "upstream age verification activity detected" \
              --body "$NEW_FINDINGS" \
              --label upstream-watch 2>/dev/null || \
            gh issue create \
              --title "upstream age verification activity detected" \
              --body "$NEW_FINDINGS"
          fi
