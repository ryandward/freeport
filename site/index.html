<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>freeport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F3F3F7;
  --fg: #0A0A0C;
  --card: #FFFFFF;
  --muted: #6E7087;
  --border: #E4E4EC;
  --red: #DC2626;
  --red-subtle: #FEF2F2;
  --red-border: #FECACA;
  --amber: #D97706;
  --amber-subtle: #FFFBEB;
  --amber-border: #FDE68A;
  --green: #059669;
  --green-subtle: #F0FDF6;
  --green-border: #A7F3D0;
  --dim: #9CA3AF;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-feature-settings: "cv02", "cv03", "cv04", "cv11";
  letter-spacing: -0.011em;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  padding: 48px 24px;
  max-width: 720px;
  margin: 0 auto;
  line-height: 1.5;
}

a { color: var(--fg); }
a:hover { opacity: 0.7; }

.header { margin-bottom: 48px; }

.title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.04em;
  margin-bottom: 2px;
}

.tagline {
  font-size: 13px;
  color: var(--muted);
}

.counts {
  display: flex;
  gap: 24px;
  margin-bottom: 40px;
}

.count-item { display: flex; flex-direction: column; }

.count-num {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 1.1;
}

.count-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.section { margin-bottom: 32px; }

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 10px;
}

.row {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 12px 16px;
  margin-bottom: -1px;
}

.row:first-of-type { border-radius: 8px 8px 0 0; }
.row:last-of-type { border-radius: 0 0 8px 8px; margin-bottom: 0; }
.row:only-of-type { border-radius: 8px; }

.row-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}

.row-project {
  font-size: 13px;
  font-weight: 600;
}

.row-component {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 1px 8px;
  border-radius: 9999px;
  border: 1px solid;
  white-space: nowrap;
}

.badge[data-status="merged"] {
  color: var(--red);
  background: var(--red-subtle);
  border-color: var(--red-border);
}

.badge[data-status="open"],
.badge[data-status="active"],
.badge[data-status="draft"] {
  color: var(--amber);
  background: var(--amber-subtle);
  border-color: var(--amber-border);
}

.badge[data-status="verified"] {
  color: var(--green);
  background: var(--green-subtle);
  border-color: var(--green-border);
}

.badge[data-status="satirical"],
.badge[data-status="watching"] {
  color: var(--muted);
  background: var(--bg);
  border-color: var(--border);
}

.row-threat {
  font-size: 13px;
  color: var(--fg);
  margin-top: 4px;
}

.row-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.row-meta a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
.row-meta a:hover { color: var(--fg); opacity: 1; }

.row-notes {
  font-size: 12px;
  color: var(--dim);
  margin-top: 2px;
}

.scan-time {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 32px;
}

.footer {
  margin-top: 48px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}

.footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
.footer a:hover { color: var(--fg); opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="title">freeport</div>
  <div class="tagline">packages without inspection</div>
</div>

<div class="counts" id="counts"></div>
<div class="scan-time" id="scan-time"></div>

<div class="section">
  <div class="section-title">Upstream threats</div>
  <div id="targets"></div>
</div>

<div class="section">
  <div class="section-title">Legal pressure</div>
  <div id="laws"></div>
</div>

<div class="section">
  <div class="section-title">Patches</div>
  <div id="patches"></div>
</div>

<div class="footer">
  <a href="https://github.com/ryandward/freeport">source</a> &middot;
  <a href="https://github.com/ryandward/freeport/issues/1">tracking issue</a> &middot;
  scanned every 4 hours
</div>

<script>
fetch('data.json').then(r => r.json()).then(data => {
  const merged = data.targets.filter(t => t.status === 'merged').length;
  const active = data.targets.filter(t => ['open','draft','active'].includes(t.status)).length;
  const ready = data.patches.filter(p => p.status === 'verified').length;

  document.getElementById('counts').innerHTML =
    `<div class="count-item"><span class="count-num" style="color:var(--red)">${merged}</span><span class="count-label">merged</span></div>` +
    `<div class="count-item"><span class="count-num" style="color:var(--amber)">${active}</span><span class="count-label">in progress</span></div>` +
    `<div class="count-item"><span class="count-num" style="color:var(--green)">${ready}</span><span class="count-label">patched</span></div>` +
    `<div class="count-item"><span class="count-num">${data.targets.length}</span><span class="count-label">tracked</span></div>`;

  document.getElementById('scan-time').textContent =
    'last scan ' + new Date(data.updated).toUTCString();

  document.getElementById('targets').innerHTML = data.targets.map(t =>
    `<div class="row">
      <div class="row-top">
        <div><span class="row-project">${t.project}</span> <span class="row-component">${t.component}</span></div>
        <span class="badge" data-status="${t.status}">${t.status}</span>
      </div>
      <div class="row-threat">${t.threat}</div>
      <div class="row-meta"><a href="${t.pr}">${t.pr_num}</a> by ${t.author} &middot; patch: <span class="badge" data-status="${t.patch}">${t.patch}</span></div>
      ${t.notes ? `<div class="row-notes">${t.notes}</div>` : ''}
    </div>`
  ).join('');

  document.getElementById('laws').innerHTML = data.laws.map(l =>
    `<div class="row">
      <div class="row-top">
        <span class="row-project">${l.jurisdiction} ${l.bill}</span>
        <span class="badge" data-status="${l.status === 'signed' ? 'merged' : 'open'}">${l.status}</span>
      </div>
      ${l.effective ? `<div class="row-meta">effective ${l.effective}</div>` : ''}
    </div>`
  ).join('');

  document.getElementById('patches').innerHTML = data.patches.map(p =>
    `<div class="row">
      <div class="row-top">
        <div><span class="row-project">${p.package}</span> <span class="row-component">${p.distro}</span></div>
        <span class="badge" data-status="${p.status}">${p.status}</span>
      </div>
    </div>`
  ).join('');
});
</script>
</body>
</html>
