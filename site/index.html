<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>freeport</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --fg: #b0b0b0;
  --dim: #505050;
  --bright: #d4d4d4;
  --red: #cc4444;
  --green: #44aa44;
  --yellow: #bbaa33;
  --blue: #4477aa;
  --border: #1a1a1a;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 40px 20px;
  max-width: 960px;
  margin: 0 auto;
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

h1 {
  color: var(--bright);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.subtitle {
  color: var(--dim);
  margin-bottom: 40px;
}

.updated {
  color: var(--dim);
  font-size: 11px;
  margin-bottom: 32px;
}

.section-label {
  color: var(--dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}

.target {
  margin-bottom: 20px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.target:last-child { border-bottom: none; }

.target-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.target-name {
  color: var(--bright);
  font-weight: 600;
}

.target-component {
  color: var(--dim);
}

.status {
  font-size: 11px;
  padding: 1px 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.status-merged { color: var(--red); }
.status-open, .status-active { color: var(--yellow); }
.status-draft { color: var(--dim); }
.status-satirical { color: var(--dim); font-style: italic; }

.target-threat {
  color: var(--fg);
  margin: 4px 0;
}

.target-meta {
  color: var(--dim);
  font-size: 11px;
}

.target-meta span { margin-right: 16px; }

.patch-status { font-size: 11px; }
.patch-available { color: var(--green); }
.patch-draft { color: var(--yellow); }
.patch-none { color: var(--dim); }
.patch-watching { color: var(--blue); }

.laws {
  margin-bottom: 40px;
}

.law {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.law:last-child { border-bottom: none; }

.law-name { color: var(--bright); }
.law-status { color: var(--dim); font-size: 11px; }
.law-effective { color: var(--yellow); font-size: 11px; }
.law-signed { color: var(--red); }

.section { margin-bottom: 40px; }

.footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  color: var(--dim);
  font-size: 11px;
}

.footer a { color: var(--dim); }
.footer a:hover { color: var(--fg); }

.count-row {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
}

.count {
  display: flex;
  flex-direction: column;
}

.count-num {
  color: var(--bright);
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
}

.count-label {
  color: var(--dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.blink {
  animation: blink 2s steps(1) infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<h1>freeport</h1>
<div class="subtitle">packages without inspection</div>

<div class="count-row" id="counts"></div>
<div class="updated" id="updated"></div>

<div class="section">
  <div class="section-label">upstream threats</div>
  <div id="targets"></div>
</div>

<div class="section laws">
  <div class="section-label">legal pressure</div>
  <div id="laws"></div>
</div>

<div class="section">
  <div class="section-label">patches</div>
  <div id="patches"></div>
</div>

<div class="footer">
  <a href="https://github.com/ryandward/freeport">source</a> &middot;
  <a href="https://github.com/ryandward/freeport/issues/1">tracking issue</a> &middot;
  updated every 4 hours by CI
</div>

<script>
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    // counts
    const merged = data.targets.filter(t => t.status === 'merged').length;
    const active = data.targets.filter(t => ['open', 'draft', 'active'].includes(t.status)).length;
    const patchReady = data.patches.filter(p => p.status === 'verified').length;

    document.getElementById('counts').innerHTML = `
      <div class="count"><span class="count-num" style="color:var(--red)">${merged}</span><span class="count-label">merged upstream</span></div>
      <div class="count"><span class="count-num" style="color:var(--yellow)">${active}</span><span class="count-label">in progress</span></div>
      <div class="count"><span class="count-num" style="color:var(--green)">${patchReady}</span><span class="count-label">patches ready</span></div>
      <div class="count"><span class="count-num">${data.targets.length}</span><span class="count-label">tracked</span></div>
    `;

    // updated
    const d = new Date(data.updated);
    document.getElementById('updated').textContent = 'last scan: ' + d.toUTCString();

    // targets
    document.getElementById('targets').innerHTML = data.targets.map(t => `
      <div class="target">
        <div class="target-header">
          <div>
            <span class="target-name">${t.project}</span>
            <span class="target-component">${t.component}</span>
          </div>
          <span class="status status-${t.status}">${t.status === 'merged' ? '&#9679; ' : ''}${t.status}</span>
        </div>
        <div class="target-threat">${t.threat}</div>
        <div class="target-meta">
          <span><a href="${t.pr}">${t.pr_num}</a></span>
          <span>by ${t.author}</span>
          <span class="patch-status patch-${t.patch}">patch: ${t.patch}</span>
        </div>
        ${t.notes ? `<div class="target-meta" style="margin-top:2px">${t.notes}</div>` : ''}
      </div>
    `).join('');

    // laws
    document.getElementById('laws').innerHTML = data.laws.map(l => `
      <div class="law">
        <div>
          <span class="law-name">${l.jurisdiction}</span>
          <span class="law-status">${l.bill}</span>
        </div>
        <div>
          <span class="law-effective ${l.status === 'signed' ? 'law-signed' : ''}">${l.status}${l.effective ? ' / ' + l.effective : ''}</span>
        </div>
      </div>
    `).join('');

    // patches
    document.getElementById('patches').innerHTML = data.patches.map(p => `
      <div class="law">
        <div>
          <span class="law-name">${p.package}</span>
          <span class="law-status">${p.distro}</span>
        </div>
        <div>
          <span class="patch-status patch-${p.status === 'verified' ? 'available' : p.status}">${p.status}</span>
        </div>
      </div>
    `).join('');
  });
</script>

</body>
</html>
